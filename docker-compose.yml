name: horafy

services:
  # ── PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: horafy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: horafy
      POSTGRES_USER: horafy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horafy_dev_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=pt_BR.UTF-8 --lc-ctype=pt_BR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horafy -d horafy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - horafy-net

  # ── Redis 7
  redis:
    image: redis:7-alpine
    container_name: horafy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-horafy_redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-horafy_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - horafy-net

  # ── RabbitMQ 3 com Management UI
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: horafy-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: horafy
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-horafy_rabbit_pass}
      RABBITMQ_DEFAULT_VHOST: horafy
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - horafy-net

  # ── Seq (log aggregator — dashboard em http://localhost:5341)
  seq:
    image: datalust/seq:2024.3
    container_name: horafy-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - horafy-net

  # ── Horafy API
  api:
    build:
      context: .
      dockerfile: src/Horafy.API/Dockerfile
    container_name: horafy-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=horafy;Username=horafy;Password=${POSTGRES_PASSWORD:-horafy_dev_pass}"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - horafy-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  seq_data:

networks:
  horafy-net:
    driver: bridge
